<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Pedidos — Smash Burguer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="top-bar">
    <span class="flame-mark">//</span>
    <h1>Painel de Pedidos</h1>
    <span class="subtitle">Cozinha · Smash Burguer</span>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="novos" onclick="filtrarPedidos('novos', event)">
      Novos <span class="tab-count">0</span>
    </button>
    <button class="tab-btn" data-tab="preparando" onclick="filtrarPedidos('preparando', event)">
      Preparando <span class="tab-count">0</span>
    </button>
    <button class="tab-btn" data-tab="entrega" onclick="filtrarPedidos('entrega', event)">
      Em Entrega <span class="tab-count">0</span>
    </button>
    <button class="tab-btn" onclick="filtrarPedidos('finalizado', event)">
      Finalizados
    </button>
  </nav>

  <div id="filtro-data-container">
    <label for="input-data">Ver pedidos de:</label>
    <input type="date" id="input-data">
  </div>

  <main class="container" id="lista-pedidos">
    <p class="empty-state">Carregando pedidos…</p>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
