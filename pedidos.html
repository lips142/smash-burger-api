<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Pedidos - Smash App</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f6f9; }
    header { background: #d35400; color: #fff; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
    
    .tabs { display: flex; justify-content: center; background: #fff; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; align-items: center; }
    .tab-btn { padding: 15px 25px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: bold; color: #666; transition: 0.3s; }
    .tab-btn:hover { color: #d35400; }
    .tab-btn.active { color: #d35400; border-bottom: 4px solid #d35400; }

    #filtro-data-container { padding: 10px 20px; background: #fff; display: none; justify-content: center; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
    #filtro-data-container label { font-size: 14px; font-weight: bold; color: #333; }
    #input-data { padding: 5px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }

    .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .pedido-card { background: #fff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 20px; border-top: 5px solid #d35400; }
    .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .pedido-header h2 { margin: 0; font-size: 18px; color: #333; }

    .status { font-weight: bold; padding: 4px 10px; border-radius: 6px; font-size: 13px; display: inline-block; margin-bottom: 10px; text-transform: uppercase;}
    
    .status.novopedido { background: #e74c3c; color: #fff; } 
    .status.preparando { background: #f1c40f; color: #fff; }
    .status.enviado { background: #3498db; color: #fff; }   
    .status.finalizado { background: #e74c3c; color: #fff; }

    .entrega-info { background: #fff8f0; padding: 10px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #f39c12; }
    .entrega-info p { margin: 3px 0; font-size: 14px; }
    
    .item { display: flex; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 12px; background-color: #eee; }
    
    .actions { margin-top: 15px; display: flex; justify-content: space-between; gap: 8px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .btn-preparar { background-color: #f1c40f; color: #fff; }
    .btn-enviar { background-color: #3498db; color: #fff; }
    .btn-finalizar { background-color: #e74c3c; color: #fff; }
  </style>
</head>
<body>

  <header>Painel de Pedidos (Cozinha)</header>

  <div class="tabs">
    <button class="tab-btn active" onclick="filtrarPedidos('novos', event)">Novos</button>
    <button class="tab-btn" onclick="filtrarPedidos('preparando', event)">Preparando</button>
    <button class="tab-btn" onclick="filtrarPedidos('entrega', event)">Em Entrega</button>
    <button class="tab-btn" onclick="filtrarPedidos('finalizado', event)">Finalizados</button>
  </div>

  <div id="filtro-data-container">
    <label for="input-data">Ver pedidos de:</label>
    <input type="date" id="input-data" onchange="renderPedidos()">
  </div>

  <div class="container" id="lista-pedidos">Carregando pedidos...</div>

<script>
    const apiBase = "http://127.0.0.1:8000";
    let todosOsPedidos = [];
    let filtroStatus = 'novos';

    // Define a data inicial como hoje (horário local)
    document.getElementById('input-data').value = new Date().toLocaleDateString('en-CA');

    async function carregarPedidos() {
      try {
        const resp = await fetch(`${apiBase}/pedidos`);
        if (!resp.ok) throw new Error();
        todosOsPedidos = await resp.json();
        renderPedidos();
      } catch (e) {
        document.getElementById("lista-pedidos").innerHTML = "<p>Erro na conexão com o servidor.</p>";
      }
    }

    function filtrarPedidos(aba, event) {
      filtroStatus = aba;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('filtro-data-container').style.display = (aba === 'finalizado') ? 'flex' : 'none';
      renderPedidos();
    }

    async function renderPedidos() {
      const container = document.getElementById("lista-pedidos");
      const dataSelecionada = document.getElementById('input-data').value;
      container.innerHTML = "";

      if (!todosOsPedidos || todosOsPedidos.length === 0) {
        container.innerHTML = "<p style='text-align:center; width:100%;'>Nenhum pedido no banco.</p>";
        return;
      }

      const pedidosFiltrados = todosOsPedidos.filter(p => {
        const s = (p.status || "").trim().toLowerCase();
        
        if (filtroStatus === 'novos') return s === 'em andamento' || s === 'novo pedido' || s === 'pendente';
        if (filtroStatus === 'preparando') return s === 'preparando';
        if (filtroStatus === 'entrega') return s === 'pedido a caminho' || s === 'enviado';
        
        if (filtroStatus === 'finalizado') {
          if (s === 'finalizado' && p.data) {
          
            const d = new Date(p.data);
            const dataCorrigida = new Date(d.getTime() - (3 * 60 * 60 * 1000)).toLocaleDateString('en-CA');
            return dataCorrigida === dataSelecionada;
          }
        }
        return false;
      });

      if (pedidosFiltrados.length === 0) {
        container.innerHTML = `<p style='text-align:center; grid-column: 1/-1; margin-top: 50px; color: #999;'>Nenhum pedido encontrado.</p>`;
        return;
      }

      for (const p of pedidosFiltrados) {
        let statusDisplay = (p.status || "").trim();
        let sLower = statusDisplay.toLowerCase();
        
        if (sLower === 'em andamento' || sLower === 'pendente') statusDisplay = "Novo pedido";
        if (sLower === 'pedido a caminho') statusDisplay = "Enviado";

        const classeStatus = statusDisplay.toLowerCase().replace(/\s/g, ""); 

        const div = document.createElement("div");
        div.className = "pedido-card";
        div.innerHTML = `
          <div class="pedido-header">
            <h2>#${p.id} - ${p.usuario_nome || 'Cliente'}</h2>
          </div>
          <div class="status ${classeStatus}">${statusDisplay}</div>
          <div id="itens-${p.id}" style="margin-top:10px"></div>
          <p><strong>Total: R$ ${parseFloat(p.total || 0).toFixed(2)}</strong></p>
          <div class="actions">
            ${(statusDisplay === 'Novo pedido') ? `<button class="btn btn-preparar" onclick="atualizarStatus(${p.id}, 'Preparando')">Preparar</button>` : ''}
            ${(statusDisplay === 'Preparando') ? `<button class="btn btn-enviar" onclick="atualizarStatus(${p.id}, 'Pedido a caminho')">Enviar</button>` : ''}
            ${(statusDisplay === 'Enviado') ? `<button class="btn btn-finalizar" onclick="atualizarStatus(${p.id}, 'Finalizado')">Finalizar</button>` : ''}
          </div>
        `;
        container.appendChild(div);
        carregarItensParaCard(p.id);
      }
    }

  async function carregarItensParaCard(pedidoId) {
  const itensDiv = document.getElementById(`itens-${pedidoId}`);
  try {
    const resp = await fetch(`${apiBase}/pedidos/${pedidoId}/itens`);
    const itens = await resp.json();
    
    itensDiv.innerHTML = itens.map(item => {
      // Extrai apenas o nome do arquivo da imagem
      const nomeImagem = item.imagem ? item.imagem.split('/').pop() : '';
      const urlCompleta = `${apiBase}/static/images/${nomeImagem}`;
      
      return `
        <div class="item">
          <img src="${urlCompleta}" onerror="this.src='https://via.placeholder.com/50?text=Lanche';">
          <div class="item-info"><h4>${item.quantidade}x ${item.nome}</h4></div>
        </div>
      `;
    }).join("");
  } catch (e) { itensDiv.innerHTML = "<p>Erro ao carregar itens</p>"; }
}

    async function atualizarStatus(pedidoId, novoStatus) {
      try {
        const resp = await fetch(`${apiBase}/pedidos/${pedidoId}/status?status=${encodeURIComponent(novoStatus)}`, {
          method: "PUT"
        });
        if (resp.ok) carregarPedidos();
      } catch (e) { alert("Erro ao atualizar status."); }
    }

    carregarPedidos();
    setInterval(carregarPedidos, 10000); 
</script>
</body>
</html>
